name: Test Suite

on:
  push:
  pull_request:

jobs:
  api-tests:
    name: API tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run API tests
        run: mvn -B test -Dgroups=api

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: api-surefire-reports
          path: target/surefire-reports

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: api-allure-results
          path: target/allure-results
          if-no-files-found: error

  ui-tests:
    name: UI tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install Playwright Chromium
        run: mvn -B exec:java -Dexec.classpathScope=test -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium"

      - name: Run UI tests
        run: mvn -B test -Dgroups=ui -Dheadless=true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-failure-screenshots
          path: target/screenshots
          if-no-files-found: ignore

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-surefire-reports
          path: target/surefire-reports

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-allure-results
          path: target/allure-results
          if-no-files-found: error

  allure-report:
    name: Allure report
    runs-on: ubuntu-latest
    needs:
      - api-tests
      - ui-tests
    if: always() && !cancelled()

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Download Allure results
        uses: actions/download-artifact@v7
        with:
          pattern: "*-allure-results"
          path: target/allure-results
          merge-multiple: true

      - name: Generate Allure report
        run: |
          mvn -B allure:report
          ./.allure/allure-*/bin/allure generate target/allure-results --clean -o target/allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v6
        with:
          name: allure-report
          path: target/allure-report
          if-no-files-found: error
